name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            binary: driver-doctor.exe
            artifact: driver-doctor-windows-x64
            package: driver-doctor-${{ github.ref_name }}-windows-x64.zip
          - name: macos
            os: macos-latest
            binary: driver-doctor
            artifact: driver-doctor-macos
            package: driver-doctor-${{ github.ref_name }}-macos.tar.gz
          - name: linux-x64
            os: ubuntu-latest
            binary: driver-doctor
            artifact: driver-doctor-linux-x64
            package: driver-doctor-${{ github.ref_name }}-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libx11-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev

      - name: Test
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item "target\release\${{ matrix.binary }}" "dist\${{ matrix.binary }}"
          Compress-Archive -Path "dist\${{ matrix.binary }}" -DestinationPath "dist\${{ matrix.package }}" -Force

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp "target/release/${{ matrix.binary }}" "dist/package/${{ matrix.binary }}"
          chmod +x "dist/package/${{ matrix.binary }}"
          tar -C dist/package -czf "dist/${{ matrix.package }}" "${{ matrix.binary }}"

      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 3
          path: dist/${{ matrix.package }}

  release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download release packages
        uses: actions/download-artifact@v4
        with:
          pattern: driver-doctor-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release-assets/* --clobber
          else
            gh release create "$TAG_NAME" release-assets/* \
              --verify-tag \
              --title "Driver Doctor $TAG_NAME" \
              --notes "Automated release for $TAG_NAME."
          fi

  cleanup:
    name: Keep recent workflow history
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      actions: write
      contents: read

    steps:
      - name: Delete older release workflow runs
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_FILE: release.yml
          KEEP_RUNS: "3"
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail

          run_ids=$(gh api "/repos/$REPOSITORY/actions/workflows/$WORKFLOW_FILE/runs?per_page=100" \
            --jq '.workflow_runs | sort_by(.created_at) | reverse | .[].id')

          index=0
          for run_id in $run_ids; do
            index=$((index + 1))
            if [ "$index" -le "$KEEP_RUNS" ]; then
              continue
            fi

            if [ "$run_id" = "$CURRENT_RUN_ID" ]; then
              continue
            fi

            gh api --method DELETE "/repos/$REPOSITORY/actions/runs/$run_id"
          done
